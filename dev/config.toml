# Dev config for preview testing.
# Theme: Sunset Window — deep navy, dusty lavender, coral accents.

tty = 2
main_log_path = "/var/log/lemurs.log"
client_log_path = "/var/log/lemurs.client.log"
cache_path = "/var/cache/lemurs"
do_log = true
pam_service = "lemurs"
system_shell = "/bin/sh"
initial_path = "/usr/local/sbin:/usr/local/bin:/usr/bin"
shell_login_flag = "short"
focus_behaviour = "default"

[background]
show_background = false

[background.style]
color = "$bg"
show_border = true
border_color = "$border"

[power_controls]
hint_margin = 2
entries = []

[[power_controls.base_entries]]
hint = "sys:halt"
hint_color = "$text_dim"
hint_modifiers = ""
key = "F1"
cmd = "systemctl poweroff -l"

[[power_controls.base_entries]]
hint = "sys:cycle"
hint_color = "$text_dim"
hint_modifiers = ""
key = "F2"
cmd = "systemctl reboot -l"

[environment_switcher]
switcher_visibility = "visible"
toggle_hint = "Switcher %key%"
toggle_hint_color = "$text_dim"
toggle_hint_modifiers = ""
include_tty_shell = false
remember = true
show_movers = true
mover_color = "$text_dim"
mover_modifiers = ""
mover_color_focused = "$accent"
mover_modifiers_focused = "bold"
left_mover = "<"
right_mover = ">"
mover_margin = 1
show_neighbours = true
neighbour_color = "$text_dim"
neighbour_modifiers = ""
neighbour_color_focused = "$text"
neighbour_modifiers_focused = ""
neighbour_margin = 1
selected_color = "$text"
selected_modifiers = "underlined"
selected_color_focused = "$text_bright"
selected_modifiers_focused = "bold"
max_display_length = 8
no_envs_text = "No environments..."
no_envs_color = "$text"
no_envs_modifiers = ""
no_envs_color_focused = "$accent_soft"
no_envs_modifiers_focused = ""

[status_message]
info_color = "$accent"
info_modifiers = ""
error_color = "$error"
error_modifiers = "bold"

[username_field]
remember = true

[username_field.style]
show_title = true
title = "ident"
title_color = "$text"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$text_bright"
show_border = true
border_color = "$border"
border_color_focused = "$border_focused"
use_max_width = true
max_width = 48

[password_field]
content_replacement_character = "*"
content_replacement_characters = "=?#^"

[password_field.style]
show_title = true
title = "auth"
title_color = "$text"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$text_bright"
show_border = true
border_color = "$border"
border_color_focused = "$border_focused"
use_max_width = true
max_width = 48

[x11]
xserver_log_path = "/var/log/lemurs.xorg.log"
x11_display = ":1"
xserver_timeout_secs = 60
xserver_path = "/usr/bin/X"
xauth_path = "/usr/bin/xauth"
scripts_path = "/etc/lemurs/wms"
xsetup_path = "/etc/lemurs/xsetup.sh"
xsessions_path = "/usr/share/xsessions"

[wayland]
scripts_path = "/etc/lemurs/wayland"
wayland_sessions_path = "/dev/null"
